<form id="app-form" class="layui-form layuimini-form">

    <div class="layui-form-item">
        <label class="layui-form-label">订单前缀</label>
        <div class="layui-input-block">
            <input type="text" name="site_order" class="layui-input" placeholder="请输入订单前缀，不建议填写" value="{:sysconfig('site','site_order')}">
            <tip>填写订单前缀。</tip>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">站点名称</label>
        <div class="layui-input-block">
            <input type="text" name="site_name" class="layui-input" placeholder="请输入站点名称" value="{:sysconfig('site','site_name')}">
            <tip>填写站点名称。</tip>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">网站标题</label>
        <div class="layui-input-block">
            <input type="text" name="site_title" class="layui-input" placeholder="请输入网站标题" value="{:sysconfig('site','site_title')}">
            <tip>填写网站标题。</tip>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">网站标语</label>
        <div class="layui-input-block">
            <input type="text" name="site_slogan" class="layui-input" placeholder="请输入网站标语" value="{:sysconfig('site','site_slogan')}">
            <tip>填写网站标语。</tip>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">网站描述</label>
        <div class="layui-input-block">
            <textarea name="site_content" class="layui-textarea"  placeholder="请输入网站描述">{:sysconfig('site','site_content')}</textarea>
            <tip>填写网站描述。</tip>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">LOGO图标</label>
        <div class="layui-input-block layuimini-upload">
            <input name="logo_image" class="layui-input layui-col-xs6" placeholder="请上传LOGO图标" value="{:sysconfig('site','logo_image')}">
            <div class="layuimini-upload-btn">
                <span><a class="layui-btn" data-upload="logo_image" data-upload-number="one" data-upload-exts="ico|png|jpg|jpeg"><i class="fa fa-upload"></i> 上传</a></span>
                <span><a class="layui-btn layui-btn-normal" id="select_logo_image" data-upload-select="logo_image" data-upload-number="one"><i class="fa fa-list"></i> 选择</a></span>
            </div>
        </div>
    </div>



    <div class="layui-form-item">
        <label class="layui-form-label">登陆背景图</label>
        <div class="layui-input-block layuimini-upload">
            <input name="site_bg" class="layui-input layui-col-xs6" placeholder="请上传浏览器背景图png,jpg类型" value="{:sysconfig('site','site_bg')}">
            <div class="layuimini-upload-btn">
                <span><a class="layui-btn" data-upload="site_bg" data-upload-number="one" data-upload-exts="ico|png|jpg|jpeg"><i class="fa fa-upload"></i> 上传</a></span>
                <span><a class="layui-btn layui-btn-normal" id="select_site_site_bg" data-upload-select="site_bg" data-upload-number="one"><i class="fa fa-list"></i> 选择</a></span>
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">备案信息</label>
        <div class="layui-input-block">
            <input type="text" name="site_beian" class="layui-input" placeholder="请输入备案信息" value="{:sysconfig('site','site_beian')}">
            <tip>填写备案信息。</tip>
        </div>
    </div>

        <label class="layui-form-label">客服QQ</label>
        <div class="layui-input-block">
            <input type="text" name="site_qq" class="layui-input" placeholder="请输入客服QQ" value="{:sysconfig('site','site_qq')}">
            <tip>填写客服QQ。</tip>
