    <style type="text/css">

        .loading {
            position: absolute;
            margin: auto;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 6.250em;
            height: 6.250em;

            -webkit-animation: rotate 2.4s linear infinite;
            -moz-animation: rotate 2.4s linear infinite;
            -o-animation: rotate 2.4s linear infinite;
            animation: rotate 2.4s linear infinite;
        }

        .loading .white {
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            opacity: 0;

            -webkit-animation: flash 2.4s linear infinite;
            -moz-animation: flash 2.4s linear infinite;
            -o-animation: flash 2.4s linear infinite;
            animation: flash 2.4s linear infinite;
        }

        .loading .dot {
            position: absolute;
            margin: auto;
            width: 2.4em;
            height: 2.4em;
            border-radius: 100%;

            -webkit-transition: all 1s ease;
            -moz-transition: all 1s ease;
            -o-transition: all 1s ease;
            transition: all 1s ease;
        }

        .loading .dot:nth-child(2) {
            top: 0;
            bottom: 0;
            left: 0;
            background: #FF4444;

            -webkit-animation: dotsY 2.4s linear infinite;
            -moz-animation: dotsY 2.4s linear infinite;
            -o-animation: dotsY 2.4s linear infinite;
            animation: dotsY 2.4s linear infinite;
        }

        .loading .dot:nth-child(3) {
            left: 0;
            right: 0;
            top: 0;
            background: #FFBB33;

            -webkit-animation: dotsX 2.4s linear infinite;
            -moz-animation: dotsX 2.4s linear infinite;
            -o-animation: dotsX 2.4s linear infinite;
            animation: dotsX 2.4s linear infinite;
        }

        .loading .dot:nth-child(4) {
            top: 0;
            bottom: 0;
            right: 0;
            background: #99CC00;

            -webkit-animation: dotsY 2.4s linear infinite;
            -moz-animation: dotsY 2.4s linear infinite;
            -o-animation: dotsY 2.4s linear infinite;
            animation: dotsY 2.4s linear infinite;
        }

        .loading .dot:nth-child(5) {
            left: 0;
            right: 0;
            bottom: 0;
            background: #33B5E5;

            -webkit-animation: dotsX 2.4s linear infinite;
            -moz-animation: dotsX 2.4s linear infinite;
            -o-animation: dotsX 2.4s linear infinite;
            animation: dotsX 2.4s linear infinite;
        }

        @keyframes rotate {
            0% {
                -webkit-transform: rotate(0);
                -moz-transform: rotate(0);
                -o-transform: rotate(0);
                transform: rotate(0);
            }
            10% {
                width: 6.250em;
                height: 6.250em;
            }
            66% {
                width: 2.4em;
                height: 2.4em;
            }
            100% {
                -webkit-transform: rotate(360deg);
                -moz-transform: rotate(360deg);
                -o-transform: rotate(360deg);
                transform: rotate(360deg);
                width: 6.250em;
                height: 6.250em;
            }
        }

        @keyframes dotsY {
            66% {
                opacity: .1;
                width: 2.4em;
            }
            77% {
                opacity: 1;
                width: 0;
            }
        }

        @keyframes dotsX {
            66% {
                opacity: .1;
                height: 2.4em;
            }
            77% {
                opacity: 1;
                height: 0;
            }
        }

        @keyframes flash {
            33% {
                opacity: 0;
                border-radius: 0%;
            }
            55% {
                opacity: .6;
                border-radius: 100%;
            }
            66% {
                opacity: 0;
            }
        }
    </style>

   function getRequest() {
        var url = window.location.search; //获取url中"?"符后的字串
        var theRequest = new Object();
        if (url.indexOf("?") != -1) {
            var str = url.substr(url.indexOf("?") + 1);
            str = str.replace(/&amp;/g, '&');
            var strs = str.split("&");
            for (var i = 0; i < strs.length; i++) {
                theRequest[strs[i].split("=")[0]] = decodeURI(strs[i].split("=")[1]);
            }
        }
        return theRequest;
    }
